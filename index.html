<style>
    .splash-video-wrapper {
        position: fixed;
        inset: 0;
        background: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        overflow: hidden;
        transition: opacity 0.6s ease;
    }
    .splash-video-wrapper video {
        width: 150vw;
        max-width: 1000px;
        height: auto;
        flex-shrink: 0;
        -webkit-mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 50%, transparent 100%);
        mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 50%, transparent 100%);
    }
    @media (max-width: 600px) {
        .splash-video-wrapper video {
            width: auto;
            height: 70vh;
            max-width: none;
        }
    }
</style>

<body class="bg-gray-100 dark:bg-[#121212]">

    <!-- Splash FUERA de #app — Blazor no lo toca al cargar -->
    <div id="splash-screen" class="splash-video-wrapper">
        <video id="splash-video" autoplay muted playsinline preload="auto">
            <source src="videos/Splash_modoClaro.mp4" type="video/mp4" />
        </video>
    </div>

    <script>
        (function () {
            var splash = document.getElementById('splash-screen');
            var video  = document.getElementById('splash-video');

            function cerrarSplash() {
                splash.style.opacity = '0';
                setTimeout(function () { splash.remove(); }, 650);
            }

            // Se cierra cuando el video termina
            video.addEventListener('ended', cerrarSplash);

            // Seguro: si el video falla o tarda más de 12s, cierra igual
            var limite = setTimeout(cerrarSplash, 12000);
            video.addEventListener('ended', function () { clearTimeout(limite); });
        })();
    </script>

    <div id="app">
        <!-- ⚠️ Error UI -->
        <div id="blazor-error-ui">
            An unhandled error has occurred.
            <a href="" class="reload">Reload</a>
            <a class="dismiss">🗙</a>
        </div>
    </div>

    <!--  Scripts principales -->
    <script src="_framework/blazor.webassembly.js"></script>

    <!--  Scripts locales -->
    <script src="js/auth.js"></script>
    <script src="js/tokenHelper.js"></script>
    <script src="js/cryptoHelper.js"></script>
    <script src="js/front.js"></script>
    <script>
        window.downloadFile = function (fileName, base64) {
            const link = document.createElement('a');
            link.href = "data:application/vnd.openxmlformats-officedocument.spreadsheetml.sheet;base64," + base64;
            link.download = fileName;
            link.click();
        }
    </script>
    <script>
        function descargarPdfDesdeBase64(base64Data, nombreArchivo) {
            const byteCharacters = atob(base64Data);
            const byteArrays = [];

            for (let i = 0; i < byteCharacters.length; i += 512) {
                const slice = byteCharacters.slice(i, i + 512);
                const byteNumbers = new Array(slice.length);
                for (let j = 0; j < slice.length; j++) {
                    byteNumbers[j] = slice.charCodeAt(j);
                }
                const byteArray = new Uint8Array(byteNumbers);
                byteArrays.push(byteArray);
            }

            const blob = new Blob(byteArrays, { type: "application/pdf" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = nombreArchivo || "Reporte.pdf";
            link.click();

            URL.revokeObjectURL(link.href);
        }
    </script>
    <script>
        window.downloadFileInNewTab = function (fileBytes, fileName) {
            const blob = new Blob([fileBytes]);
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = fileName;
            a.target = '_blank'; // Abrir en nueva pestaña
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            window.URL.revokeObjectURL(url);
        };

        // Cargar la preferencia guardada
        document.addEventListener("DOMContentLoaded", function () {
            const theme = localStorage.getItem("theme") || "light";
            if (theme === "dark") {
                document.documentElement.classList.add("dark");
            }
        });

        // Función para Blazor
        function toggleTheme() {
            const html = document.documentElement;
            const isDark = html.classList.toggle("dark");
            localStorage.setItem("theme", isDark ? "dark" : "light");
        }

    </script>

    <script>
        tailwind.config = {
            darkMode: 'class'
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.26.25/dist/sweetalert2.all.min.js" integrity="sha384-nLoOnA/BDh8A/jxqtckg4DumuCGOBYUnNJLZdQz/zfYNp3wcjGSoWTAzgko06G/2" crossorigin="anonymous"></script>
